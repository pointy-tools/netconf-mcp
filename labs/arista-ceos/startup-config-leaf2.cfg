hostname leaf2
!
vlan 10
   name WEB
!
vlan 20
   name APP
!
vlan 100
   name MLAG-PEER
!
interface Port-Channel10
   description MLAG-Peer-Link
   switchport mode trunk
   switchport trunk allowed vlan 100
   mlag 10
!
interface Port-Channel20
   description Dual-Attached-Hosts
   switchport mode trunk
   switchport trunk allowed vlan 10,20
   mlag 20
!
interface Ethernet2
   description MLAG-Peer-Link
   channel-group 10 mode active
!
interface Ethernet3
   description Dual-Attached-Host
   channel-group 20 mode active
!
interface Ethernet1
   description Uplink-to-Spine
   no switchport
   ip address 192.168.0.2/31
   no shutdown
!
interface Loopback0
   description VTEP-Source
   ip address 10.0.0.2/32
   no shutdown
!
interface Vlan10
   description WEB
   ip address 172.16.10.2/24
   no shutdown
!
interface Vlan20
   description APP
   ip address 172.16.20.2/24
   no shutdown
!
interface Vlan100
   description MLAG-PEER
   ip address 192.168.0.5/31
   no shutdown
!
mlag configuration
   domain-id 10
   local-interface Vlan100
   peer-address 192.168.0.4
   peer-link Port-Channel10
   priority secondary
!
ip routing
!
ip prefix-list PREFIX-LIST-LOOPBACKS seq 10 permit 10.0.0.0/24
ip prefix-list PREFIX-LIST-VXLAN seq 10 permit 172.16.0.0/16
ip prefix-list PREFIX-LIST-MGMT seq 10 permit 192.168.0.0/24
!
route-map RM-IMPORT-LOOPBACKS permit 10
   match ip address prefix-list PREFIX-LIST-LOOPBACKS
!
route-map RM-EXPORT-VXLAN permit 10
   match ip address prefix-list PREFIX-LIST-VXLAN
!
route-map RM-MLAG-PEER permit 10
   match ip address prefix-list PREFIX-LIST-MGMT
!
ip access-list ACL-BLOCK-ADMIN
   10 deny ip 10.10.10.0/24 any
   20 permit ip any any
!
ip access-list ACL-ALLOW-WEB
   10 permit tcp any any eq 80
   20 permit tcp any any eq 443
   30 deny ip any any
!
interface Ethernet1
   ip access-group ACL-BLOCK-ADMIN in
!
interface Vlan10
   ip access-group ACL-ALLOW-WEB in
!
router bgp 65001
   router-id 10.0.0.2
   neighbor 10.0.0.3 remote-as 65001
   neighbor 10.0.0.3 update-source Loopback0
   neighbor 10.0.0.3 route-reflector-client
   !
   address-family evpn
      neighbor 10.0.0.3 activate
   !
   address-family ipv4
      neighbor 10.0.0.3 activate
      neighbor 10.0.0.3 route-map RM-IMPORT-LOOPBACKS in
      neighbor 10.0.0.3 route-map RM-EXPORT-VXLAN out
!
vxlan source-interface Loopback0
vxlan udp-port 4789
vxlan vlan 10 vni 1001
vxlan vlan 20 vni 1002
vxlan vrf prod vni 2001
!
management api netconf
   transport ssh
   port 830
   no shutdown
!
end

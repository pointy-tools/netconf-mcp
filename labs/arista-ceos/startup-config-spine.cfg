hostname spine
!
vlan 10
   name WEB
!
vlan 20
   name APP
!
interface Ethernet1
   description Uplink-to-Leaf1
   no switchport
   ip address 192.168.0.1/31
   no shutdown
!
interface Ethernet2
   description Uplink-to-Leaf2
   no switchport
   ip address 192.168.0.3/31
   no shutdown
!
interface Loopback0
   description Route-Reflector-ID
   ip address 10.0.0.3/32
   no shutdown
!
ip routing
!
ip prefix-list PREFIX-LIST-LOOPBACKS seq 10 permit 10.0.0.0/24
ip prefix-list PREFIX-LIST-VXLAN seq 10 permit 172.16.0.0/16
ip prefix-list PREFIX-LIST-UNDERLAY seq 10 permit 192.168.0.0/24
!
route-map RM-LEAF-IN permit 10
   match ip address prefix-list PREFIX-LIST-LOOPBACKS
!
route-map RM-LEAF-OUT permit 10
   match ip address prefix-list PREFIX-LIST-VXLAN
!
route-map RM-UNDERLAY-IN permit 10
   match ip address prefix-list PREFIX-LIST-UNDERLAY
!
ip access-list ACL-SPINE-FILTER
   10 permit tcp 10.0.0.0/24 any
   20 permit tcp any 10.0.0.0/24
   30 deny ip any any
!
interface Ethernet1
   ip access-group ACL-SPINE-FILTER in
!
router bgp 65001
   router-id 10.0.0.3
   neighbor 10.0.0.1 remote-as 65001
   neighbor 10.0.0.1 update-source Loopback0
   neighbor 10.0.0.1 route-reflector-client
   !
   neighbor 10.0.0.2 remote-as 65001
   neighbor 10.0.0.2 update-source Loopback0
   neighbor 10.0.0.2 route-reflector-client
   !
   address-family evpn
      neighbor 10.0.0.1 activate
      neighbor 10.0.0.2 activate
   !
   address-family ipv4
      neighbor 10.0.0.1 activate
      neighbor 10.0.0.1 route-map RM-LEAF-IN in
      neighbor 10.0.0.1 route-map RM-LEAF-OUT out
      neighbor 10.0.0.2 activate
      neighbor 10.0.0.2 route-map RM-LEAF-IN in
      neighbor 10.0.0.2 route-map RM-LEAF-OUT out
!
management api netconf
   transport ssh
   port 830
   no shutdown
!
end
